<!doctype html>
<html lang="es">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8" />
    <title>Gráfica</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="css/estilos.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body class="d-flex justify-content-center align-items-center vh-100">
    <div class="card-grafica p-4 text-center">
      <h3>Gráfica de transacciones</h3>
      <canvas id="miGrafica" width="300" height="200"></canvas>
      <a href="pokemon.html" class="btn btn-secondary w-100">Volver</a>
    </div>
    <script>
      const ctx = document.getElementById("miGrafica");
      new Chart(ctx, {
        type: "bar",
        data: {
          labels: ["Depósitos", "Retiros", "Pagos"],
          datasets: [
            {
              label: "Cantidad ($)",
              data: [100, 750, 25],
              borderWidth: 1,
            },
          ],
        },
      });
    </script>
  </body>
</html>
